version: 2
project_name: aiOpenCAD
dist: goreleaser-dist

before:
  hooks:
    - npm --prefix frontend run build

builds:
  - id: windows-amd64
    binary: aiOpenCAD
    dir: ./backend
    main: ./cmd/server
    flags:
      - -buildvcs=false
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    hooks:
      pre: go run build/pre/pre-build.go -os=windows -arch=amd64 -tag={{.Tag}}

archives:
  - formats: [zip]
    name_template: "aiOpenCAD_{{.Os}}_{{.Arch}}_{{.Tag}}"
    files:
      - src: build/release.config.json
        dst: config.json
      - daemon.json
      - favicon.ico
      - dist/**
      - README.md
